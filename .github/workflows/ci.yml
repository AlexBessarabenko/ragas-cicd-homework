name: Ragas CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Ragas tests
      env:
        YANDEX_API_KEY: ${{ secrets.YANDEX_API_KEY }}
        YANDEX_FOLDER_ID: ${{ secrets.YANDEX_FOLDER_ID }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        pytest tests/ -v --html=report.html --self-contained-html
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ragas-test-results
        path: |
          tests/ragas_results.json
          report.html
    
    - name: Quality Gate Check
      if: always()
      run: |
        if [ -f tests/ragas_results.json ]; then
          echo "📊 Результаты Ragas:"
          cat tests/ragas_results.json | jq '{faithfulness, answer_similarity, context_recall}'
          
          # Проверяем пороги (теперь значения скалярные, не списки)
          FAITHFULNESS=$(cat tests/ragas_results.json | jq -r '.faithfulness')
          ANSWER_SIMILARITY=$(cat tests/ragas_results.json | jq -r '.answer_similarity')
          CONTEXT_RECALL=$(cat tests/ragas_results.json | jq -r '.context_recall')
          
          # Проверяем только ненулевые значения
          if [ "$FAITHFULNESS" != "null" ]; then
            if (( $(echo "$FAITHFULNESS < 0.7" | bc -l) )); then
              echo "❌ Quality Gate Failed: Faithfulness ниже 0.7 ($FAITHFULNESS)"
              exit 1
            fi
            echo "✅ Faithfulness passed: $FAITHFULNESS >= 0.7"
          else
            echo "⚠️ Faithfulness не вычислено (null), пропускаем проверку"
          fi
          
          if [ "$ANSWER_SIMILARITY" != "null" ]; then
            if (( $(echo "$ANSWER_SIMILARITY < 0.6" | bc -l) )); then
              echo "❌ Quality Gate Failed: Answer Similarity ниже 0.6 ($ANSWER_SIMILARITY)"
              exit 1
            fi
            echo "✅ Answer Similarity passed: $ANSWER_SIMILARITY >= 0.6"
          else
            echo "⚠️ Answer Similarity не вычислено (null), пропускаем проверку"
          fi
          
          if [ "$CONTEXT_RECALL" != "null" ]; then
            if (( $(echo "$CONTEXT_RECALL < 0.6" | bc -l) )); then
              echo "❌ Quality Gate Failed: Context Recall ниже 0.6 ($CONTEXT_RECALL)"
              exit 1
            fi
            echo "✅ Context Recall passed: $CONTEXT_RECALL >= 0.6"
          else
            echo "⚠️ Context Recall не вычислено (null), пропускаем проверку"
          fi
          
          echo "✅ Quality Gate Passed"
        else
          echo "⚠️ Файл результатов не найден"
        fi
